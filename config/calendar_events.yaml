metadata:
  config_version: 1
  description: "Scheduled event windows used as risk flags, not trade signals."

market:
  country: US
  timezone: America/New_York

event_windows:
  eia:
    enabled: false
    timezone: America/New_York
    pre_release_window_seconds: 300
    post_release_window_seconds: 900
    initial_fetch_delay_seconds: 30
    fast_retry_interval_seconds: 60
    fast_retry_window_seconds: 1200
    delayed_retry_interval_seconds: 3600
    releases: []

  cpi:
    enabled: false
    timezone: America/New_York
    windows: []

  fomc:
    enabled: false
    timezone: America/New_York
    windows: []

  earnings:
    enabled: false
    events: []

  holidays:
    enabled: false
    dates: []

  early_closes:
    enabled: false
    dates: []
