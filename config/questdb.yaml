metadata:
  config_version: 1
  description: "QuestDB config for V2 bot ledger only."
  questdb_role: bot_ledger_only
  not_market_data_warehouse: true

connection:
  http_scheme_env: QUESTDB_HTTP_SCHEME
  http_host_env: QUESTDB_HTTP_HOST
  http_port_env: QUESTDB_HTTP_PORT
  health_timeout_seconds_env: QUESTDB_HEALTH_TIMEOUT_SECONDS
  pg_host_env: QUESTDB_PG_HOST
  pg_port_env: QUESTDB_PG_PORT
  default_http_scheme: http
  default_http_host: localhost
  default_http_port: 9000
  default_health_timeout_seconds: 3.0
  default_pg_host: localhost
  default_pg_port: 8812

health_check:
  endpoint: /exec
  query: "SELECT 1"
  required_by_default: false

ledger_tables:
  - bot_runs
  - bot_sessions
  - feature_snapshots
  - model_signals
  - cost_estimates
  - context_state_snapshots
  - risk_decisions
  - context_indicator_snapshots
  - context_ai_events
  - context_flags
  - order_events
  - fill_events
  - trade_outcomes
  - latency_metrics
  - system_health_events
  - ledger_write_errors
  - jsonl_fallback_events

forbidden_uses:
  - historical_databento_market_warehouse
  - raw_tick_archive_for_training
  - dbn_to_questdb_to_parquet_training_flow

jsonl_fallback:
  enabled: true
  directory: data/emergency_ledger
  description: "Tiny fallback for failed ledger writes only."
