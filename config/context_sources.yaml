metadata:
  config_version: 1
  description: "V2 context source configuration."

validation_modes:
  usaspending:
    allow_health_only_without_recipient_mapping: true

structured_sources:
  eia:
    enabled: true
    api_key_env: EIA_API_KEY
    purpose: "Oil inventory and release-window context."
    feeds_memory_cache: true
    writes_questdb_ledger: true
    used_in_per_tick_loop: false
    timeout_seconds: 10.0
    max_staleness_seconds: 86400

  fred:
    enabled: true
    api_key_env: FRED_API_KEY
    purpose: "Slow daily Treasury-rate context."
    feeds_memory_cache: true
    writes_questdb_ledger: true
    used_in_per_tick_loop: false
    timeout_seconds: 10.0
    max_observation_age_calendar_days: 5
    observation_fetch_limit: 20
    series_ids:
      us_treasury_3m_yield: DGS3MO
      us_treasury_2y_yield: DGS2
      us_treasury_10y_yield: DGS10

  usaspending:
    enabled: true
    api_key_required: false
    purpose: "Ticker-linked U.S. government contract award discovery for future profitability research."
    feeds_memory_cache: true
    writes_questdb_ledger: true
    used_in_per_tick_loop: false
    timeout_seconds: 10.0
    intended_poll_interval_seconds: 900
    discovery_last_modified_lookback_calendar_days: 14
    source_last_updated_max_age_calendar_days: 3
    search_limit_per_recipient: 100
    max_award_details_per_recipient_per_run: 50
    funding_limit_per_award: 100
    revision_recheck_calendar_days: 45
    max_revision_rechecks_per_run: 50
    late_discovery_calendar_days: 2
    award_registry_retention_calendar_days: 180
    checkpoint_path: "data/usaspending/award_checkpoint.json"
    recipient_map_path: "config/usaspending_recipient_ticker_map.yaml"
    contract_awards_only: true

  macro_calendar:
    enabled: true
    purpose: "Reviewed local U.S. macro calendar context for research-only event-window analysis."
    artifact_path: "config/macro_calendar.yaml"
    feeds_memory_cache: true
    writes_questdb_ledger: true
    used_in_per_tick_loop: false
    offline_local_artifact: true
    runtime_network_access: false
    live_scraper: false
    direct_trade_authority: false
    upcoming_lookahead_days: 14

  yfinance_dev_only:
    enabled: true
    development_only: true
    production_critical: false
    required: false
    purpose: "Development-only sector/index proxy context."
    feeds_memory_cache: true
    writes_questdb_ledger: true
    used_in_per_tick_loop: false
    period: "5d"
    interval: "5m"
    timeout_seconds: 10.0
    bar_completion_grace_seconds: 30
    max_staleness_seconds: 360
    auto_adjust: false
    actions: false
    repair: false
    keepna: true
    prepost: false
    threads: true

unstructured_sources:
  sec_edgar:
    enabled: false
    organization_env: SEC_ORGANIZATION
    contact_email_env: SEC_CONTACT_EMAIL
    purpose: "Research-only SEC 8-K section classification and deterministic Form 4 P/S parsing."
    feeds_ai_context_filter: true
    direct_trade_authority: false
    timeout_seconds: 10.0
    max_retries: 2
    retry_base_delay_seconds: 0.5
    retry_max_delay_seconds: 8.0
    request_rate_per_second: 2.0
    archive_path: "data_lake/context/sec_edgar"

  news:
    enabled: false
    purpose: "News text for AI context flags."
    feeds_ai_context_filter: true
    direct_trade_authority: false

  social:
    enabled: false
    purpose: "Social/political posts for AI context flags."
    feeds_ai_context_filter: true
    direct_trade_authority: false

ai_context_filter:
  enabled: false
  provider: gemini
  model: gemini-3.5-flash
  api_key_env: GEMINI_API_KEY
  prompt_version: context_filter_v1
  response_schema_version: context_classification_response_v1
  timeout_seconds: 30.0
  max_retries: 2
  retry_base_delay_seconds: 0.5
  retry_max_delay_seconds: 4.0
  max_input_characters: 12000
  max_prompt_characters: 30000
  max_summary_characters: 500
  max_output_tokens: 256
  max_provider_calls_per_minute: 6
  max_provider_calls_per_run: 20
  dedup_cache_max_entries: 256
  temperature: 0
  direct_trade_authority: false
